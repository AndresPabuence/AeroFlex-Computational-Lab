<svg xmlns="http://www.w3.org/2000/svg" width="36cm" height="36cm" viewBox="0 0 36 36">
<text x="3" y="1.5" font-size="0.7" font-family="Arial">AeroFlex Prototype Cutting Templates</text>
<text x="3" y="2.2" font-size="0.4" font-family="Arial">Use the same base dimensions for all prototypes. Main variable: wingtip shape.</text>
<text x="3" y="2.5" font-size="0.45" font-family="Arial">1. Baseline Wing - straight wing, no wingtip modification</text>
<rect x="3" y="3" width="30" height="8" stroke="black" fill="none" stroke-width="0.05" />
<text x="3" y="11.6" font-size="0.35" font-family="Arial">30 cm wingspan</text>
<text x="33.3" y="7" font-size="0.35" font-family="Arial">8 cm chord</text>
<text x="3" y="13.5" font-size="0.45" font-family="Arial">2. Simple Wingtip - fold both tips upward 30 to 45 degrees</text>
<rect x="3" y="14" width="30" height="8" stroke="black" fill="none" stroke-width="0.05" />
<line x1="6" y1="14" x2="6" y2="22" stroke="black" stroke-width="0.04" stroke-dasharray="0.3,0.2"/>
<line x1="30" y1="14" x2="30" y2="22" stroke="black" stroke-width="0.04" stroke-dasharray="0.3,0.2"/>
<text x="3.3" y="22.6" font-size="0.35" font-family="Arial">Fold line: 3 cm from each wingtip</text>
<text x="14" y="22.6" font-size="0.35" font-family="Arial">Bend upward: 30 to 45 degrees</text>
<text x="3" y="24.5" font-size="0.45" font-family="Arial">3. Curved Wingtip - use smooth curved ends</text>
<rect x="6" y="25" width="24" height="8" stroke="black" fill="none" stroke-width="0.05" />
<path d="M 6 25 C 4.2 25.5, 3 27.0, 3 29.0 C 3 31.0, 4.2 32.5, 6 33" stroke="black" fill="none" stroke-width="0.05"/>
<path d="M 30 25 C 31.8 25.5, 33 27.0, 33 29.0 C 33 31.0, 31.8 32.5, 30 33" stroke="black" fill="none" stroke-width="0.05"/>
<line x1="6" y1="25" x2="6" y2="33" stroke="black" stroke-width="0.04" stroke-dasharray="0.3,0.2"/>
<line x1="30" y1="25" x2="30" y2="33" stroke="black" stroke-width="0.04" stroke-dasharray="0.3,0.2"/>
<text x="3" y="33.6" font-size="0.35" font-family="Arial">Curved ends should be cut smoothly and kept symmetric.</text>
<text x="3" y="35" font-size="0.4" font-family="Arial">Note: Verify printed scale with a ruler before cutting physical materials.</text>
</svg>